name = "unimarket-admin"
main = "src/index.ts"
compatibility_date = "2024-12-01"

# Workers AI — optional assist for ID document checks
[ai]
binding = "AI"

[vars]
UNIMARKET_API_URL = "https://unimarket-api.youngfuturetechnology.xyz"

# Set secret: wrangler secret put ADMIN_API_KEY

# Auto-review pending seller applications without AI summary (backup if API trigger misses)
[triggers]
crons = ["*/2 * * * *"]
